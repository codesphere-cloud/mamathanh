schemaVersion: v0.2
prepare:
  steps:
    - name: Install
      command: npm ci
    - name: Claude Code
      command: sudo npm install -g @anthropic-ai/claude-code
test:
  steps: []
run:
  app:
    steps:
      - name: Run
        command: sudo n latest && node index.js
    plan: 8
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
      paths:
        - port: 3000
          path: /
          stripPath: false
    env: {}
