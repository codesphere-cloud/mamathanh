schemaVersion: v0.2
prepare:
  steps:
    - name: Install
      command: npm ci
test:
  steps: []
run:
  app:
    plan: 302
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
      paths:
        - port: 3000
          path: /
          stripPath: false
    env: {}
    steps:
      - name: Run
        command: sudo n 16.18 && node index.js
